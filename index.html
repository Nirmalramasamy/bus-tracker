<!DOCTYPE html>
<html>
<head>

<title>Smart Bus Tracking System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

<style>

body{
font-family: Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#1976D2;
color:white;
text-align:center;
padding:15px;
font-size:22px;
}

#map{
height:400px;
width:100%;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#1976D2;
color:white;
padding:10px;
width:100%;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

span{
color:#E91E63;
font-weight:bold;
}

#qrcode{
margin-top:15px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
Smart Bus Tracking System
</div>

<div id="map"></div>

<div class="container">

<div class="card">

<h3>Bus Information</h3>

<p>Status: <span id="status">Loading...</span></p>

<p>Location: <span id="location">Waiting for GPS...</span></p>

</div>

<div class="card">

<h3>Book Bus Ticket</h3>

<form id="ticketForm">

<label>Name</label>
<input type="text" id="name" required>

<label>From</label>
<input type="text" id="from" required>

<label>To</label>
<input type="text" id="to" required>

<label>Seats</label>
<select id="seats">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<button type="submit">Book Ticket</button>

</form>

<div id="qrcode"></div>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyADFWLXTQZ1WF2i-X5zojRFCvk-fw9wZa0",
authDomain: "bus-tracking-system-36943.firebaseapp.com",
databaseURL: "https://bus-tracking-system-36943-default-rtdb.firebaseio.com",
projectId: "bus-tracking-system-36943",
storageBucket: "bus-tracking-system-36943.firebasestorage.app",
messagingSenderId: "985917120436",
appId: "1:985917120436:web:70f24dc6a741e8ea3adce1"
};

firebase.initializeApp(firebaseConfig);

let map;
let marker;

function initMap(){

let startLocation = {lat:11.0168,lng:76.9558};

map = new google.maps.Map(document.getElementById("map"),{
zoom:14,
center:startLocation
});

marker = new google.maps.Marker({
position:startLocation,
map:map,
title:"Bus Location"
});

listenBusLocation();

}

function listenBusLocation(){

firebase.database().ref("bus_data/bus1").on("value",function(snapshot){

let data = snapshot.val();

if(data){

let location = {
lat:data.lat,
lng:data.lng
};

marker.setPosition(location);
map.panTo(location);

document.getElementById("status").innerHTML="Running";

document.getElementById("location").innerHTML =
data.lat + " , " + data.lng;

}

});

}

document.getElementById("ticketForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let from=document.getElementById("from").value;
let to=document.getElementById("to").value;
let seats=document.getElementById("seats").value;

let ticketData =
"Passenger: "+name+
"\nFrom: "+from+
"\nTo: "+to+
"\nSeats: "+seats;

document.getElementById("qrcode").innerHTML="";

QRCode.toCanvas(document.getElementById("qrcode"), ticketData);

});

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyADFWLXTQZ1WF2i-X5zojRFCvk-fw9wZa0&callback=initMap" async defer></script>

</body>
</html>
